<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>你在班里是什么隐藏型人格？</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      background: linear-gradient(135deg, #f7f8ff, #eef3ff);
      color: #222;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 14px 40px rgba(39, 76, 119, 0.12);
      margin-top: 20px;
    }

    .title {
      font-size: 30px;
      font-weight: 800;
      line-height: 1.3;
      margin-bottom: 10px;
      color: #1f2a44;
    }

    .subtitle {
      font-size: 16px;
      color: #5b6475;
      line-height: 1.8;
      margin-bottom: 18px;
    }

    .badge {
      display: inline-block;
      background: #eef2ff;
      color: #4c5cff;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .btn {
      border: none;
      background: linear-gradient(135deg, #5b6cff, #7a5cff);
      color: #fff;
      padding: 14px 22px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 10px 24px rgba(91, 108, 255, 0.22);
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn.secondary {
      background: #eef1f7;
      color: #2b3550;
      box-shadow: none;
    }

    .btn.copy-btn {
      background: linear-gradient(135deg, #20b486, #16a36f);
      box-shadow: 0 10px 24px rgba(32, 180, 134, 0.2);
    }

    .hidden {
      display: none;
    }

    .progress-wrap {
      margin-bottom: 20px;
    }

    .progress-text {
      font-size: 14px;
      color: #687086;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .progress-bar {
      width: 100%;
      height: 12px;
      background: #edf0f7;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #5b6cff, #9c6cff);
      transition: width 0.35s ease;
    }

    .question-title {
      font-size: 24px;
      font-weight: 800;
      line-height: 1.5;
      margin-bottom: 16px;
      color: #1f2a44;
    }

    .options {
      display: grid;
      gap: 14px;
    }

    .option {
      border: 2px solid #e7ebf4;
      border-radius: 18px;
      padding: 16px;
      cursor: pointer;
      transition: 0.2s ease;
      background: #fff;
    }

    .option:hover {
      border-color: #7280ff;
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(85, 102, 255, 0.08);
    }

    .option-letter {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #eef2ff;
      color: #5261ff;
      font-weight: 800;
      margin-right: 10px;
      font-size: 14px;
    }

    .option-text {
      display: inline;
      font-size: 16px;
      line-height: 1.7;
      color: #283044;
      font-weight: 600;
    }

    .result-header {
      text-align: center;
      margin-bottom: 18px;
    }

    .result-tag {
      display: inline-block;
      background: linear-gradient(135deg, #5b6cff, #9b6cff);
      color: #fff;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 14px;
    }

    .result-title {
      font-size: 32px;
      font-weight: 900;
      margin: 0 0 10px;
      color: #1c2640;
    }

    .result-desc {
      font-size: 17px;
      color: #4f596d;
      line-height: 1.9;
      margin: 0 auto;
      max-width: 620px;
    }

    .section-title {
      font-size: 20px;
      font-weight: 800;
      margin: 26px 0 14px;
      color: #1f2a44;
    }

    .chart {
      display: grid;
      gap: 14px;
      margin-top: 14px;
    }

    .chart-row {
      background: #f8faff;
      border-radius: 16px;
      padding: 12px 14px;
      border: 1px solid #edf1f8;
    }

    .chart-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      gap: 8px;
    }

    .chart-label {
      font-size: 15px;
      font-weight: 700;
      color: #2b3550;
    }

    .chart-score {
      font-size: 14px;
      font-weight: 800;
      color: #5b6cff;
      white-space: nowrap;
    }

    .chart-track {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      background: #e8edf7;
      overflow: hidden;
    }

    .chart-fill {
      height: 100%;
      border-radius: 999px;
      width: 0%;
      transition: width 0.5s ease;
      background: linear-gradient(90deg, #5b6cff, #8d67ff);
    }

    .copy-box {
      background: #f7f9fd;
      border: 1px dashed #ccd5e7;
      border-radius: 18px;
      padding: 16px;
      margin-top: 16px;
      white-space: pre-wrap;
      line-height: 1.8;
      color: #2d3550;
      font-size: 15px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }

    .footer-tip {
      margin-top: 18px;
      font-size: 14px;
      color: #6a7388;
      line-height: 1.8;
      text-align: center;
    }

    .small-tip {
      margin-top: 10px;
      color: #788198;
      font-size: 13px;
      line-height: 1.7;
    }

    .share-highlight {
      background: linear-gradient(135deg, #fff7e8, #fff1d8);
      border: 1px solid #ffe1a8;
      color: #8a5b00;
      border-radius: 16px;
      padding: 14px 16px;
      margin-top: 18px;
      font-size: 14px;
      line-height: 1.8;
      font-weight: 600;
    }

    @media (max-width: 640px) {
      .title {
        font-size: 24px;
      }

      .question-title {
        font-size: 20px;
      }

      .result-title {
        font-size: 26px;
      }

      .card {
        padding: 18px;
        border-radius: 20px;
      }

      .btn {
        width: 100%;
      }

      .actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 首页 -->
    <div class="card" id="startScreen">
      <div class="badge">班级隐藏人格测试</div>
      <div class="title">你在班里是什么隐藏型人格？</div>
      <div class="subtitle">
        8 道题，测出你在同学眼里的真实气质。<br />
        不是普通 MBTI，这次测的是你的“班级人设”。
      </div>
      <button class="btn" onclick="startQuiz()">开始测试</button>
      <div class="small-tip">
        提示：测试结果更偏向“你在班级关系中的气场与人设”，适合分享给同学一起玩。
      </div>
    </div>

    <!-- 测试页 -->
    <div class="card hidden" id="quizScreen">
      <div class="progress-wrap">
        <div class="progress-text" id="progressText">第 1 / 8 题</div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <div class="question-title" id="questionTitle"></div>
      <div class="options" id="optionsContainer"></div>
    </div>

    <!-- 结果页 -->
    <div class="card hidden" id="resultScreen">
      <div class="result-header">
        <div class="result-tag">测试结果</div>
        <h2 class="result-title" id="resultTitle"></h2>
        <p class="result-desc" id="resultDesc"></p>
      </div>

      <div class="section-title">你的班级气质图表</div>
      <div class="chart" id="chartContainer"></div>

      <div class="section-title">适合分享的结果文案</div>
      <div class="copy-box" id="copyText"></div>

      <div class="actions">
        <button class="btn copy-btn" onclick="copyResult()">复制结果</button>
        <button class="btn secondary" onclick="restartQuiz()">重新测试</button>
      </div>

      <div class="share-highlight">
        你可以把复制后的结果发到抖音评论区、同学群、朋友圈，或者直接让别人来测。
      </div>

      <div class="footer-tip">
        测试仅供娱乐，欢迎转发给同学，看看大家眼里的你到底是什么人设。
      </div>
    </div>
  </div>

  <script>
    const questions = [
      {
        question: "1. 课间时，你通常更像哪一种？",
        options: [
          { text: "被很多人围着聊天，气氛很自然就热起来", scores: { social: 3, influence: 2 } },
          { text: "不一定话多，但总有人会主动来找你", scores: { calm: 2, mystery: 2, influence: 1 } },
          { text: "安静待着，但你其实一直在观察全场", scores: { mystery: 3, calm: 2 } },
          { text: "看起来低调，其实脑子里戏很多", scores: { humor: 2, mystery: 2, calm: 1 } }
        ]
      },
      {
        question: "2. 班里突然要选人做一件事，你最像哪种情况？",
        options: [
          { text: "大家第一反应就想到你", scores: { influence: 3, social: 1 } },
          { text: "你不一定主动，但做了通常很稳", scores: { calm: 3, influence: 1 } },
          { text: "你会先看情况，再决定要不要出手", scores: { strategy: 3, mystery: 1 } },
          { text: "你会用一种轻松方式把事情做掉", scores: { humor: 3, social: 1 } }
        ]
      },
      {
        question: "3. 你在同学眼里更容易留下哪种印象？",
        options: [
          { text: "好相处，没什么距离感", scores: { social: 3 } },
          { text: "表面淡定，其实气场挺强", scores: { calm: 2, influence: 2 } },
          { text: "有点神秘，不太容易被看透", scores: { mystery: 4 } },
          { text: "有趣，跟你待一起不会无聊", scores: { humor: 4 } }
        ]
      },
      {
        question: "4. 班里气氛尴尬的时候，你更可能怎么做？",
        options: [
          { text: "主动说点什么，把气氛拉回来", scores: { social: 2, humor: 2 } },
          { text: "一句话不多，但开口就很有用", scores: { calm: 2, influence: 2 } },
          { text: "先观察，等最合适的时候再说", scores: { strategy: 3, mystery: 1 } },
          { text: "不一定出声，但别人会注意到你的反应", scores: { mystery: 2, influence: 1, calm: 1 } }
        ]
      },
      {
        question: "5. 如果同学偷偷评价你，最可能会说什么？",
        options: [
          { text: "这个人挺会来事，也很会带节奏", scores: { social: 2, influence: 2 } },
          { text: "平时看着普通，其实很有自己的东西", scores: { mystery: 2, strategy: 2 } },
          { text: "看起来稳稳的，感觉挺让人放心", scores: { calm: 4 } },
          { text: "这个人一开口就很有节目效果", scores: { humor: 4 } }
        ]
      },
      {
        question: "6. 在集体里，你更像哪一种存在？",
        options: [
          { text: "自然形成焦点的人", scores: { influence: 3, social: 2 } },
          { text: "不是最显眼，但很难被替代的人", scores: { calm: 2, strategy: 2 } },
          { text: "存在感忽高忽低，但一认真就很强", scores: { mystery: 2, influence: 2 } },
          { text: "负责让大家轻松下来的人", scores: { humor: 3, social: 1 } }
        ]
      },
      {
        question: "7. 你最像下面哪种“班级隐藏设定”？",
        options: [
          { text: "表面随和，实际很会影响别人对你的看法", scores: { influence: 3, strategy: 1 } },
          { text: "平时低调，但关键时刻特别能顶", scores: { calm: 2, influence: 2 } },
          { text: "别人以为你简单，其实你很难被读懂", scores: { mystery: 4 } },
          { text: "平常不一定正经，但你有自己的魅力", scores: { humor: 3, social: 1 } }
        ]
      },
      {
        question: "8. 如果把你当成班级剧本里的角色，你最像谁？",
        options: [
          { text: "自带存在感的主角型人物", scores: { influence: 4 } },
          { text: "平静但可靠的稳定核心", scores: { calm: 4 } },
          { text: "话不一定多，但全身都是悬念", scores: { mystery: 4 } },
          { text: "一出场就能把气氛带偏的快乐角色", scores: { humor: 4 } }
        ]
      }
    ];

    const archetypes = [
      {
        key: "influence",
        title: "班级气场主角",
        desc: "你在班里属于那种自带存在感的人。你不一定总是最吵的，但你很容易成为别人关注的中心。很多时候，大家会不自觉地留意你的反应、态度和选择。你身上有一种“主角感”——不是刻意抢镜，而是你本来就很难被忽略。"
      },
      {
        key: "mystery",
        title: "高冷神秘观察者",
        desc: "你在同学眼里有一种不太好被看透的气质。你可能并不总是主动表现，但正因为这样，别人会更想知道你真实在想什么。你身上自带一点距离感和故事感，属于那种越接触越让人上头的人设。"
      },
      {
        key: "humor",
        title: "反差感快乐制造机",
        desc: "你在班级里最大的魅力，是你能让气氛轻松下来。你可能一句话就能把别人逗笑，也可能总能带来一些意想不到的梗。别人对你的印象通常是“有趣”“不无聊”“跟你在一起很有节目效果”。"
      },
      {
        key: "calm",
        title: "安静型隐藏大佬",
        desc: "你平时未必最显眼，但你身上有一种很稳的力量。别人也许不会第一时间想到你最爱表现，但会慢慢发现：你很能扛事，也很有自己的节奏。你给人的感觉是安静、靠谱、内核强。"
      },
      {
        key: "social",
        title: "人缘感氛围中心",
        desc: "你最大的特点是没有太强的距离感，别人和你相处会比较轻松。你很容易融入群体，也有一种自然带动氛围的能力。你可能不是最神秘的那个，但一定是很容易被喜欢和接近的那个。"
      },
      {
        key: "strategy",
        title: "低调型控场玩家",
        desc: "你不是那种会把所有情绪和想法都摆在明面上的人。你更像一个会看局势、懂分寸、知道什么时候该出手的人。别人可能低估你的存在感，但其实你比很多人更会掌控节奏。"
      }
    ];

    const scoreLabels = {
      influence: "主角气场",
      mystery: "神秘感",
      humor: "有趣值",
      calm: "稳定感",
      social: "亲和力",
      strategy: "控场力"
    };

    let currentQuestion = 0;
    let totalScores = {
      influence: 0,
      mystery: 0,
      humor: 0,
      calm: 0,
      social: 0,
      strategy: 0
    };

    function startQuiz() {
      document.getElementById("startScreen").classList.add("hidden");
      document.getElementById("quizScreen").classList.remove("hidden");
      currentQuestion = 0;
      totalScores = {
        influence: 0,
        mystery: 0,
        humor: 0,
        calm: 0,
        social: 0,
        strategy: 0
      };
      renderQuestion();
    }

    function renderQuestion() {
      const questionData = questions[currentQuestion];
      document.getElementById("questionTitle").textContent = questionData.question;
      document.getElementById("progressText").textContent = `第 ${currentQuestion + 1} / ${questions.length} 题`;
      document.getElementById("progressFill").style.width = `${((currentQuestion + 1) / questions.length) * 100}%`;

      const optionsContainer = document.getElementById("optionsContainer");
      optionsContainer.innerHTML = "";

      questionData.options.forEach((option, index) => {
        const optionEl = document.createElement("div");
        optionEl.className = "option";
        optionEl.innerHTML = `
          <span class="option-letter">${String.fromCharCode(65 + index)}</span>
          <span class="option-text">${option.text}</span>
        `;
        optionEl.onclick = () => selectOption(option.scores);
        optionsContainer.appendChild(optionEl);
      });
    }

    function selectOption(scores) {
      for (const key in scores) {
        totalScores[key] += scores[key];
      }

      currentQuestion++;

      if (currentQuestion < questions.length) {
        renderQuestion();
      } else {
        showResult();
      }
    }

    function getTopType() {
      let topKey = "";
      let maxScore = -1;

      for (const key in totalScores) {
        if (totalScores[key] > maxScore) {
          maxScore = totalScores[key];
          topKey = key;
        }
      }

      return archetypes.find(item => item.key === topKey);
    }

    function showResult() {
      document.getElementById("quizScreen").classList.add("hidden");
      document.getElementById("resultScreen").classList.remove("hidden");

      const result = getTopType();
      document.getElementById("resultTitle").textContent = result.title;
      document.getElementById("resultDesc").textContent = result.desc;

      renderChart();
      generateCopyText(result);
    }

    function renderChart() {
      const chartContainer = document.getElementById("chartContainer");
      chartContainer.innerHTML = "";

      const maxPossible = 16;

      Object.keys(scoreLabels).forEach(key => {
        const score = totalScores[key];
        const percent = Math.min((score / maxPossible) * 100, 100);

        const row = document.createElement("div");
        row.className = "chart-row";
        row.innerHTML = `
          <div class="chart-top">
            <div class="chart-label">${scoreLabels[key]}</div>
            <div class="chart-score">${score} 分</div>
          </div>
          <div class="chart-track">
            <div class="chart-fill" style="width:${percent}%"></div>
          </div>
        `;
        chartContainer.appendChild(row);
      });
    }

    function generateCopyText(result) {
      const sortedTraits = Object.entries(totalScores)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 3)
        .map(([key, value]) => `${scoreLabels[key]} ${value}分`)
        .join("｜");

      const text = `我测出来的班级隐藏人格是：${result.title}
      
${result.desc}

我的气质图表：
${sortedTraits}

来测测你在班里是什么隐藏型人格：
8道题，测出你在同学眼里的真实气质。`;

      document.getElementById("copyText").textContent = text;
    }

    function copyResult() {
      const text = document.getElementById("copyText").textContent;

      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text)
          .then(() => {
            alert("复制成功，快去发给同学吧！");
          })
          .catch(() => {
            fallbackCopy(text);
          });
      } else {
        fallbackCopy(text);
      }
    }

    function fallbackCopy(text) {
      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.style.position = "fixed";
      textarea.style.left = "-9999px";
      document.body.appendChild(textarea);
      textarea.focus();
      textarea.select();

      try {
        document.execCommand("copy");
        alert("复制成功，快去发给同学吧！");
      } catch (err) {
        alert("复制失败，请手动长按复制。");
      }

      document.body.removeChild(textarea);
    }

    function restartQuiz() {
      document.getElementById("resultScreen").classList.add("hidden");
      document.getElementById("startScreen").classList.remove("hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  </script>
</body>
</html>
